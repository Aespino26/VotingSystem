<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - E-Voting</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <a class="brand compact" href="/student.html" aria-label="E-Voting home">
      <div class="brand-mark" aria-hidden="true">EV</div>
      <div>
        <p class="eyebrow">Student portal</p>
        <h1>E-Voting</h1>
      </div>
    </a>
    <div class="header-actions">
      <span id="userBadge" class="user-badge">Student</span>
      <button id="logoutBtn" class="secondary">Logout</button>
    </div>
  </header>

  <main class="dashboard">
    <section class="page-title">
      <p class="eyebrow">Election workspace</p>
      <h2>Cast, review, and track your vote</h2>
    </section>

    <section class="dashboard-grid student-grid">
      <div class="card ballot-card">
        <div class="section-heading">
          <p class="eyebrow">Active ballot</p>
          <h2>Cast your vote</h2>
        </div>
        <div id="candidates" class="stacked-list"></div>
        <div class="card-footer">
          <button id="submitVote" class="primary">Submit vote</button>
          <div id="voteMessage" class="message" role="status"></div>
        </div>
      </div>

      <aside class="side-column">
        <section class="card">
          <div class="section-heading">
            <p class="eyebrow">Receipt</p>
            <h2>Your votes</h2>
          </div>
          <div id="myVotes" class="stacked-list"></div>
        </section>

        <section class="card">
          <div class="section-heading">
            <p class="eyebrow">Current count</p>
            <h2>Results</h2>
          </div>
          <div id="results" class="stacked-list"></div>
        </section>
      </aside>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
